<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle de Vendas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Painel de Controle</h1>
        <div class="tabs">
            <button class="tab-button active" onclick="showTab('cliente')">Cadastrar Cliente</button>
            <button class="tab-button" onclick="showTab('produto')">Cadastrar Produto</button>
            <button class="tab-button" onclick="showTab('venda')">Cadastrar Venda</button>
        </div>
        <div id="cliente" class="tab-content active">
            <h2>Cadastrar Cliente</h2>
            <form id="clienteForm">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" required>

                <label for="telefone">Telefone:</label>
                <input type="text" id="telefone" required>

                <label for="endereco">Endereço:</label>
                <input type="text" id="endereco" required>

                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" required>

                <label for="tamanho">Tamanho:</label>
                <input type="text" id="tamanho">

                <label for="foto">Foto (URL):</label>
                <input type="url" id="foto">

                <button type="submit">Cadastrar</button>
            </form>
        </div>
        <div id="produto" class="tab-content">
            <h2>Cadastrar Produto</h2>
            <form id="produtoForm">
                <label for="prodNome">Nome:</label>
                <input type="text" id="prodNome" required>

                <label for="quantidade">Quantidade:</label>
                <input type="number" id="quantidade" required>

                <label for="categoria">Categoria:</label>
                <input type="text" id="categoria" required>

                <label for="descricao">Descrição:</label>
                <textarea id="descricao"></textarea>

                <label for="precoCompra">Preço de Compra:</label>
                <input type="number" step="0.01" id="precoCompra" required>

                <label for="precoVenda">Preço de Venda:</label>
                <input type="number" step="0.01" id="precoVenda" required>

                <label for="imagem">Imagem (URL):</label>
                <input type="url" id="imagem">

                <label for="barraDoProduto">Código de Barras:</label>
                <input type="text" id="barraDoProduto">

                <button type="submit">Cadastrar</button>
            </form>
        </div>
        <div id="venda" class="tab-content">
            <h2>Cadastrar Venda</h2>
            <form id="vendaForm">
                <label for="clienteId">ID do Cliente:</label>
                <input type="number" id="clienteId" required>

                <label for="clienteNome">Nome do Cliente:</label>
                <input type="text" id="clienteNome" required>

                <label for="vendedor">Vendedor:</label>
                <input type="text" id="vendedor" required>

                <label for="tipoPagamento">Tipo de Pagamento:</label>
                <select id="tipoPagamento" required>
                    <option value="DINHEIRO">Dinheiro</option>
                    <option value="CARTAO">Cartão</option>
                    <option value="PIX">PIX</option>
                </select>

                <label for="descontoTipo">Tipo de Desconto:</label>
                <input type="text" id="descontoTipo" placeholder="Ex: PERCENTUAL">

                <label for="descontoValor">Valor do Desconto:</label>
                <input type="number" step="0.01" id="descontoValor">

                <div id="itens">
                    <h3>Itens da Venda</h3>
                    <div class="item">
                        <label>Produto ID:</label>
                        <input type="number" class="produtoId" required>
                        <label>Quantidade:</label>
                        <input type="number" class="quantidade" required>
                        <label>Preço:</label>
                        <input type="number" step="0.01" class="preco" required>
                        <button type="button" onclick="removerItem(this)">Remover</button>
                    </div>
                </div>
                <button type="button" onclick="adicionarItem()">Adicionar Item</button>

                <button type="submit">Cadastrar Venda</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
