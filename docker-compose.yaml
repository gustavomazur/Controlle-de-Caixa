version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: contador_loja_db
    restart: always
    environment:
      MYSQL_DATABASE: contador_loja
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-volume:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - contador-network

  app:
    build: .
    container_name: contador_loja_api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/contador_loja
      SPRING_DATASOURCE_USERNAME: app_user
      SPRING_DATASOURCE_PASSWORD: app_password
    networks:
      - contador-network

volumes:
  mysql-volume:

networks:
  contador-network:
    driver: bridge
